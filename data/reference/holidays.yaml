# holidays.yaml — Argentine national public holidays 2020–2025.
# Used by detect_anomalies() to label STL residual spikes.
#
# Sources:
#   - argentina.gob.ar/jefatura/feriados-nacionales-* (official)
#   - officeholidays.com/countries/argentina (cross-checked)
#   - Ley 27.399 (trasladable rules: Tue/Wed → prev Mon; Thu/Fri → next Mon)
#
# Fields:
#   date     : YYYY-MM-DD (actual observed holiday date, after any trasladable shift)
#   name_es  : Spanish name
#   name_en  : English name
#   type     : inamovible | trasladable | puente | semana_santa | carnaval
#
# Note: "puente" entries are tourism bridge days declared by executive decree each year.
# "semana_santa" includes Maundy Thursday (optional) and Good Friday (mandatory).
# Carnaval (Mon+Tue before Ash Wednesday) is mandatory since 2011.

